<!DOCTYPE html>
<html>
<head>
    <title>Shop</title>
</head>
<body>
    <h1>🛒 My Shop</h1>

    {% for p in products %}
        <div style="border:1px solid black; margin:10px; padding:10px;">
            <h3>{{ p.name }}</h3>
            <p>Price: ₹{{ p.price }}</p>
            <a href="/add/{{ p.id }}">Add to Cart</a>
        </div>
    {% endfor %}

    <a href="/cart">Go to Cart</a>
</body>
</html>
